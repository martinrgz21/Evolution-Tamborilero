<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Anemómetro & Polares Avanzadas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-main">
      <h1>SISTEMA DE NAVEGACIÓN</h1>
      <div id="net-status" class="status-indicator"></div>
    </div>
    <nav class="tabs">
      <button class="tab-btn active" data-tab="instrumentos">INSTRUMENTOS</button>
      <button class="tab-btn" data-tab="estrategia">ESTRATEGIA</button>
      <button class="tab-btn" data-tab="polar-tab">POLAR</button>
      <button class="tab-btn" data-tab="historial-tab">HISTORIAL</button>
      <button class="tab-btn" data-tab="config">AJUSTES</button>
    </nav>
  </header>

  <main class="tab-content">
    <section id="tab-instrumentos" class="panel active">
      <div class="grid-inst">
        <div class="card bg-highlight"><span class="label">SOG</span><span id="val-sog" class="value">—</span><span class="unit">kn</span></div>
        <div class="card bg-highlight"><span class="label">COG</span><span id="val-cog" class="value">—</span><span class="unit">°</span></div>
        <div class="card"><span class="label">TWS</span><span id="val-tws" class="value">—</span><span class="unit">kn</span></div>
        <div class="card"><span class="label">TWA</span><span id="val-twa" class="value">—</span><span class="unit">°</span></div>
        <div class="card"><span class="label">HDG</span><span id="val-hdg" class="value">—</span><span class="unit">°</span></div>
        <div class="card"><span class="label">BSP</span><span id="val-bsp" class="value">—</span><span class="unit">kn</span></div>
      </div>
      <div class="perf-bar-container">
        <div class="perf-labels"><span>RENDIMIENTO POLAR</span><span id="val-perf">—</span></div>
        <div class="perf-track"><div id="perf-fill" class="perf-fill"></div></div>
      </div>
    </section>

    <section id="tab-estrategia" class="panel">
      <div class="strat-layout">
        <div id="panel-strat" class="strat-map-box" style="position: relative;">
          <canvas id="strat-canvas"></canvas>
          <button id="btn-autocenter" style="position: absolute; top: 16px; right: 16px; background: var(--surface); color: var(--navy); border: 1px solid var(--navy); padding: 8px 14px; font-family: var(--sans); font-size: 0.75rem; font-weight: 600; border-radius: 4px; cursor: pointer; z-index: 10; transition: all 0.2s ease;">
            Autocentrado: ON
          </button>
        </div>
        <div class="strat-sidebar">
          <div class="chrono-box">
            <span id="chrono-display" class="chrono-time">05:00</span>
            <div class="chrono-controls">
              <button id="btn-start-chrono">START</button>
              <button id="btn-sync-chrono">SYNC</button>
            </div>
          </div>
          <div class="marks-box">
            <button id="btn-set-pin" class="btn-mark btn-pin">SET PIN</button>
            <button id="btn-set-comite" class="btn-mark btn-comite">SET COMITÉ</button>
            <button id="btn-set-barlovento" class="btn-mark btn-barlo">SET BARLOVENTO</button>
          </div>
          <div class="strat-data">
            <div class="data-row"><span class="lbl">DIST. LÍNEA</span><span id="strat-dist" class="val">—</span></div>
            <div class="data-row"><span class="lbl">TIEMPO LÍNEA</span><span id="strat-ttl" class="val">—</span></div>
            <div class="data-row"><span class="lbl">ACCIÓN RECOM.</span><span id="strat-action" class="val">—</span></div>
          </div>
        </div>
      </div>
    </section>

    <section id="tab-polar-tab" class="panel">
      <div class="polar-table-wrapper">
        <table id="table-polar"><thead><tr id="polar-headers"></tr></thead><tbody id="polar-body"></tbody></table>
      </div>
    </section>

    <section id="tab-historial-tab" class="panel">
      <div class="history-table-wrapper">
        <table><thead><tr><th>HORA</th><th>SOG</th><th>COG</th><th>TWS</th><th>TWA</th><th>PERF</th></tr></thead><tbody id="history-body"></tbody></table>
      </div>
    </section>

    <section id="tab-config" class="panel">
      <div class="config-grid">
        <div class="config-card">
          <h3>CONEXIÓN DE RED</h3>
          <div class="form-group"><label>IP Servidor</label><input type="text" id="cfg-ip" value="127.0.0.1"></div>
          <div class="form-group"><label>Puerto</label><input type="number" id="cfg-port" value="8080"></div>
          <button id="btn-save-net">CONECTAR SISTEMA</button>
        </div>
        <div class="config-card">
          <h3>FUENTE DE VELOCIDAD</h3>
          <div class="form-group">
            <select id="cfg-speed-source"><option value="SOG">SOG (GPS)</option><option value="BSP">BSP (Corredera)</option></select>
          </div>
        </div>
        <div class="config-card">
          <h3>MANTENIMIENTO DE DATOS</h3>
          <button id="btn-clear-history" style="background: #b22222; color: white; margin-bottom: 10px; width: 100%;">BORRAR HISTORIAL</button>
          <button id="btn-clear-marks" style="background: #a37f4c; color: white; width: 100%;">BORRAR MARCAS DE REGATA</button>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
